<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="760" viewBox="0 0 1040 760" role="img" aria-labelledby="title desc">
  <title id="title">Vista previa del portal clínico Affinix LAB</title>
  <desc id="desc">Mock estático de un dashboard con casos clínicos, estados de producción y aprobación 3D.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071827"/>
      <stop offset="1" stop-color="#0e1a2b"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#c9fbff"/>
      <stop offset="1" stop-color="#19d7ff"/>
    </linearGradient>
    <linearGradient id="sidebar" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#06111f"/>
      <stop offset="1" stop-color="#0b2033"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#00101f" flood-opacity="0.36"/>
    </filter>
    <radialGradient id="glow" cx="72%" cy="16%" r="70%">
