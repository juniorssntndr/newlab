      <stop offset="0.48" stop-color="#10d7ff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#10d7ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1040" height="760" rx="42" fill="url(#bg)"/>
