name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  contracts-compat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Verify contract compatibility
        run: npm run contracts:check

  backend-check:
    needs: contracts-compat
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: node --check src/index.js && node --check src/routes/auth.js && node --check src/routes/pedidos.js && node --check src/routes/finanzas.js && node --check src/routes/productos.js && node --check src/routes/audit.js && node --check src/middleware/auth.js && node --check src/middleware/validate.js && node --check src/config/env.js && node --check src/services/storage.js && node --check src/services/audit.js && node --check src/lib/logger.js && node --check src/validation/schemas.js && node --check scripts/smoke.js

  frontend-build:
    needs: contracts-compat
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
