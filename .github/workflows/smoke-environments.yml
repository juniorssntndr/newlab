name: Smoke Environments

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  smoke-staging:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check secrets
        id: check
        working-directory: .
        run: |
          if [ -z "${{ secrets.STAGING_BACKEND_URL }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: npm ci

      - name: Run staging smoke
        if: steps.check.outputs.skip != 'true'
        env:
          SMOKE_BACKEND_URL: ${{ secrets.STAGING_BACKEND_URL }}
          SMOKE_FRONTEND_URL: ${{ secrets.STAGING_FRONTEND_URL }}
        run: npm run smoke

  smoke-production:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check secrets
        id: check
        working-directory: .
        run: |
          if [ -z "${{ secrets.PROD_BACKEND_URL }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: npm ci

      - name: Run production smoke
        if: steps.check.outputs.skip != 'true'
        env:
          SMOKE_BACKEND_URL: ${{ secrets.PROD_BACKEND_URL }}
          SMOKE_FRONTEND_URL: ${{ secrets.PROD_FRONTEND_URL }}
        run: npm run smoke
